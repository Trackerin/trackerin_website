services:
  web:
    image: nginx:alpine
    container_name: trackerin_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - public_data:/var/www/html/public
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - trackerin_network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trackerin_app
    restart: unless-stopped
    volumes:
      - public_data:/var/www/html/public
      - storage_data:/var/www/html/storage
      - ./.env:/var/www/html/.env
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    depends_on:
      - db
    networks:
      - trackerin_network

  db:
    image: postgres:15-alpine
    container_name: trackerin_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-trackerin}
      POSTGRES_USER: ${DB_USERNAME:-trackerin_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - trackerin_db_data:/var/lib/postgresql/data
    networks:
      - trackerin_network

networks:
  trackerin_network:
    driver: bridge

volumes:
  trackerin_db_data:
  public_data:
  storage_data:
