server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com; # Ganti dengan domain Anda

    # Uncomment baris ini setelah SSL Certbot dipasang
    # listen 443 ssl;
    # listen [::]:443 ssl;
    # ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:8080;
        
        # Meneruskan Host asli
        proxy_set_header Host $host;
        
        # Meneruskan IP Client Asli
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # Meneruskan protokol HTTPS agar terbaca oleh Laravel
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
